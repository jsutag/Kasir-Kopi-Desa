<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir & Stok - Kopi Desa</title>
    <style>
        :root { 
            --bg-base: #F5F0E6; 
            --card-bg: #FFFFFF; 
            --navy: #1A2B4C; 
            --navy-light: #2A406D; 
            --green: #2A5C43; 
            --text-muted: #5A6B7C; 
            --border: #D9D2C5; 
            --danger: #DC2626; 
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-base); color: var(--navy); margin: 0; padding: 0; }
        .nav-bar { background-color: var(--navy); color: white; display: flex; justify-content: space-around; padding: 14px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .nav-item { font-weight: 600; cursor: pointer; opacity: 0.7; padding: 4px 12px; border-radius: 6px; transition: all 0.2s; }
        .nav-item.active { opacity: 1; background-color: rgba(255, 255, 255, 0.15); }
        .main-container { max-width: 1200px; margin: 0 auto; padding: 16px; box-sizing: border-box; }
        .pos-layout { display: grid; grid-template-columns: 1fr 340px; gap: 16px; }
        @media (max-width: 768px) { 
            .main-container { padding: 10px; padding-bottom: 0; }
            .pos-layout { display: flex; flex-direction: column; min-height: calc(100vh - 60px); gap: 10px; } 
            .menu-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
            .cart-sidebar { 
                position: sticky; 
                bottom: 0; 
                top: auto; 
                z-index: 105; 
                max-height: 50vh; 
                margin: auto -10px 0 -10px; 
                border-radius: 20px 20px 0 0; 
                box-shadow: 0 -5px 20px rgba(0,0,0,0.15); 
                border: none;
            }
            .cart-items-list { min-height: 60px; }
        }
        .category-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--card-bg); border: 1.5px solid var(--border); padding: 8px 16px; border-radius: 20px; font-weight: 600; color: var(--navy-light); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .cat-btn.active { background: var(--green); color: white; border-color: var(--green); }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 8px; }
        .menu-item-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; box-shadow: 0 2px 4px rgba(26,43,76,0.03); transition: transform 0.1s; display: flex; flex-direction: column; justify-content: space-between; min-height: 70px; }
        .menu-item-card:active { transform: scale(0.95); }
        .item-name { font-weight: 600; font-size: 0.95rem; line-height: 1.3; }
        .item-cat-badge { font-size: 0.72rem; color: var(--text-muted); background: var(--bg-base); padding: 2px 8px; border-radius: 10px; margin-top: 6px; align-self: center; font-weight: 500; }
        .cart-sidebar { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; box-shadow: 0 4px 10px rgba(26,43,76,0.05); display: flex; flex-direction: column; max-height: 80vh; position: sticky; top: 70px; }
        .cart-title { margin: 0 0 12px 0; font-size: 1.1rem; font-weight: 700; border-bottom: 2px solid var(--bg-base); padding-bottom: 8px; }
        .cart-items-list { overflow-y: auto; margin-bottom: 16px; min-height: 150px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #F0EAE0; }
        .cart-item-name { font-size: 0.9rem; font-weight: 600; padding-right: 8px; }
        .cart-qty-controls { display: flex; align-items: center; gap: 8px; }
        .qty-btn { background: var(--bg-base); border: none; width: 26px; height: 26px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .checkout-btn { background: var(--navy); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; }
        .checkout-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
        .report-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .report-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--bg-base); padding-bottom: 12px; margin-bottom: 16px; }
        .reset-btn { background: #FEF2F2; color: var(--danger); border: 1px solid #FCA5A5; padding: 8px 14px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .ingredients-table { width: 100%; border-collapse: collapse; }
        .ingredients-table th, .ingredients-table td { text-align: left; padding: 12px; border-bottom: 1px solid var(--bg-base); }
        .ingredients-table th { background-color: var(--bg-base); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div id="navKasir" class="nav-item active" onclick="switchView('kasir')">🏪 Mesin Kasir</div>
        <div id="navLaporan" class="nav-item" onclick="switchView('laporan')">📊 Penggunaan Bahan Hari Ini</div>
    </div>
    <div class="main-container">
        <div id="viewKasir" class="pos-layout">
            <div class="menu-section">
                <div class="category-tabs" id="mainTabs">
                    <button class="cat-btn active" onclick="showMainCategory('Minuman', this)">☕ Minuman</button>
                    <button class="cat-btn" onclick="showMainCategory('Makanan', this)">🍟 Makanan</button>
                    <button class="cat-btn" onclick="showMainCategory('Based', this)">⚙️ Based</button>
                </div>
                <div class="category-tabs" id="subTabs"></div>
                <input id="searchInput" type="text" placeholder="🔍 Cari menu..." style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);margin-bottom:10px;box-sizing:border-box;" oninput="searchMenu()">
                <div id="menuGrid" class="menu-grid"></div>
            </div>
            <div class="cart-sidebar">
                <h3 class="cart-title">Pesanan Aktif</h3>
                <div id="cartItemsList" class="cart-items-list"></div>
                <button onclick="clearCart()" class="checkout-btn" style="background:#dc2626;margin-bottom:10px;">🗑 Kosongkan Keranjang</button><button id="btnCheckout" class="checkout-btn" onclick="prosesCheckout()" disabled>PROSES PESANAN</button>
            </div>
        </div>
        
        <div id="viewLaporan" class="report-section hidden">
            <div class="report-header">
                <h2>Akumulasi Pemakaian Bahan</h2>
                <button class="reset-btn" onclick="resetLaporanBahan()">🔄 Reset / Mulai Hari Baru</button>
            </div>
            <table class="ingredients-table">
                <thead><tr><th>Nama Bahan</th><th style="text-align: right;">Total Terpakai</th></tr></thead>
                <tbody id="ingredientsReportBody"></tbody>
            </table>
        </div>
    </div>

    <script src="data.js"></script>
    
    <script>
        let cart = []; 
        const allItems = recipes;
let currentMainCategory='Minuman';
let currentSubCategory='All'; 

        
function showMainCategory(category, btn){
document.querySelectorAll('#mainTabs .cat-btn').forEach(b=>b.classList.remove('active'));
if(btn) btn.classList.add('active');
currentMainCategory=category;
const sub=document.getElementById('subTabs');

if(category==='Minuman'){
sub.innerHTML=`<button class="cat-btn active" onclick="filterSub('All', this)">Semua</button>
<button class="cat-btn" onclick="filterSub('Es Kopi', this)">Es Kopi</button>
<button class="cat-btn" onclick="filterSub('Hot Coffee', this)">Hot Coffee</button>
<button class="cat-btn" onclick="filterSub('Coffee Reguler', this)">Coffee Reguler</button>
<button class="cat-btn" onclick="filterSub('Non Coffee', this)">Non Coffee</button>
<button class="cat-btn" onclick="filterSub('Teh', this)">Teh</button>
<button class="cat-btn" onclick="filterSub('Softdrink', this)">Softdrink</button>
<button class="cat-btn" onclick="filterSub('Additional', this)">Additional</button>`;
renderMenuGrid(allItems.filter(i=>i.kategori!=='Makanan' && i.kategori!=='Based'));
}else if(category==='Makanan'){
sub.innerHTML=`<button class="cat-btn active" onclick="filterSub('All Makanan', this)">Semua</button>
<button class="cat-btn" onclick="filterSub('Cemilan', this)">Cemilan</button>
<button class="cat-btn" onclick="filterSub('Indomie', this)">Indomie</button>`;
renderMenuGrid(allItems.filter(i=>i.kategori==='Makanan'));
}else{
sub.innerHTML='';
renderMenuGrid(allItems.filter(i=>i.kategori==='Based'));
}
}

function filterSub(category, btn){
document.querySelectorAll('#subTabs .cat-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
currentSubCategory=category;
if(category==='All'){
renderMenuGrid(allItems.filter(i=>i.kategori!=='Makanan' && i.kategori!=='Based'));
}else if(category==='All Makanan'){
renderMenuGrid(allItems.filter(i=>i.kategori==='Makanan'));
}else{
renderMenuGrid(allItems.filter(i=>i.kategori===category || i.sub_kategori===category));
}
}

function searchMenu(){
const q=document.getElementById('searchInput').value.toLowerCase();
const cards=allItems.filter(i=>i.nama.toLowerCase().includes(q));
renderMenuGrid(cards);
}

function clearCart(){
if(confirm('Kosongkan semua pesanan?')){
cart=[];
renderCart();
}
}

// Fungsi Tampil Tombol Grid Menu
        function renderMenuGrid(items) {
            const grid = document.getElementById('menuGrid'); 
            grid.innerHTML = '';
            items.forEach(function(item) {
                const card = document.createElement('div'); 
                card.className = 'menu-item-card'; 
                card.onclick = function() { addToCart(item); };
                
                // FIXED: Menggunakan string biasa
                card.innerHTML = '<div class="item-name">' + item.nama + '</div><div class="item-cat-badge">' + item.kategori + '</div>';
                
                grid.appendChild(card);
            });
        }

        function filterMenu(category, btnElement) {
            document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); }); 
            btnElement.classList.add('active');
            const filtered = category === 'All' ? allItems : allItems.filter(function(m) { return m.kategori === category; }); 
            renderMenuGrid(filtered);
        }

        // Fungsi Masuk Keranjang Belanja
        function addToCart(menuItem) {
            const existing = cart.find(function(c) { return String(c.id) === String(menuItem.id); });
            if (existing) { 
                existing.qty++; 
            } else { 
                // clone object
                cart.push({
                    id: menuItem.id,
                    nama: menuItem.nama,
                    kategori: menuItem.kategori,
                    bahan: menuItem.bahan,
                    qty: 1
                }); 
            }
            renderCart();
        }

        function updateQty(id, change) {
            const item = cart.find(function(c) { return String(c.id) === String(id); });
            if (item) { 
                item.qty += change; 
                if (item.qty <= 0) {
                    cart = cart.filter(function(c) { return String(c.id) !== String(id); });
                }
            }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cartItemsList'); 
            const btn = document.getElementById('btnCheckout'); 
            list.innerHTML = '';
            
            if (cart.length === 0) { 
                list.innerHTML = '<p style="color:var(--text-muted); text-align:center; margin-top:40px;">Belum ada pesanan.</p>'; 
                btn.disabled = true; 
                return; 
            }
            
            cart.forEach(function(item) {
                const div = document.createElement('div'); 
                div.className = 'cart-item';
                
                // FIXED: Menggunakan string biasa
                div.innerHTML = '<div class="cart-item-name">' + item.nama + '</div>' + 
                                '<div class="cart-qty-controls">' +
                                '<button class="qty-btn" onclick="updateQty(\'' + item.id + '\', -1)">-</button>' +
                                '<span style="font-weight:600;">' + item.qty + '</span>' +
                                '<button class="qty-btn" onclick="updateQty(\'' + item.id + '\', 1)">+</button>' +
                                '</div>';
                                
                list.appendChild(div);
            });
            btn.disabled = false;
        }

        // Logika Hitung & Potong Bahan Otomatis
        function parseIngredientText(bahanStr) {
            const numMatch = bahanStr.match(/\d+([.,]\d+)?/);
            if (!numMatch) return { name: bahanStr.trim(), qty: 1, unit: 'pcs' };
            const qty = parseFloat(numMatch[0].replace(',', '.')); 
            const idx = bahanStr.indexOf(numMatch[0]);
            return { 
                name: bahanStr.substring(0, idx).trim(), 
                qty: qty, 
                unit: bahanStr.substring(idx + numMatch[0].length).trim() 
            };
        }

function prosesCheckout() {
    let log = JSON.parse(localStorage.getItem('kopiDesa_laporan_bahan')) || {};
    cart.forEach(c => {
        c.bahan.forEach(b => {
            // Regex buat misahin angka dan teks
            const m = b.match(/(\d+([.,]\d+)?)\s*([a-zA-Z]+)/);
            if (m) {
                const qty = parseFloat(m[1].replace(',', '.')) * c.qty;
                
                // --- BAGIAN PENTING: Normalisasi ---
                // 1. Ambil teks bahannya (misal: "Fresh milk")
                // 2. .trim() buat hapus spasi di depan/belakang
                // 3. .toLowerCase() buat paksa semua huruf jadi kecil
                const key = b.replace(m[1], '').trim().toLowerCase();
                
                log[key] = (log[key] || 0) + qty;
            }
        });
    });
    localStorage.setItem('kopiDesa_laporan_bahan', JSON.stringify(log));
    cart = []; 
    renderCart(); 
    alert("Pesanan berhasil diproses!");
}
// Tampilkan Hasil Rekap Bahan
function renderReportTable() {
    const tbody = document.getElementById('ingredientsReportBody'); 
    tbody.innerHTML = '';
    let laporanBahan = JSON.parse(localStorage.getItem('kopiDesa_laporan_bahan')) || {}; 
    const keys = Object.keys(laporanBahan);
    
    if (keys.length === 0) { 
        tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; color:var(--text-muted);">Belum ada pemakaian bahan hari ini.</td></tr>'; 
        return; 
    }
    
    keys.forEach(function(key) {
        // Anggap key lu formatnya "nama bahan unit" (misal: "gula aren ml")
        // Kita pecah supaya unitnya pisah
        const parts = key.split(' ');
        const unit = parts.pop(); // Ambil kata terakhir sebagai unit (ml atau g)
        const nameRaw = parts.join(' '); // Sisanya adalah nama bahan
        
        // Bikin huruf pertama jadi Kapital
        const name = nameRaw.charAt(0).toUpperCase() + nameRaw.slice(1);
        const total = Number(laporanBahan[key].toFixed(2));
        
        const row = '<tr>' +
                        '<td><strong>' + name + '</strong></td>' +
                        '<td style="text-align: right; font-weight: 600; color: var(--green);">' + total + ' ' + unit + '</td>' +
                    '</tr>';
                    
        tbody.innerHTML += row;
    });
}

        function resetLaporanBahan() { 
            if (confirm("Reset data harian? Semua akumulasi pengeluaran bahan hari ini akan dimulai dari 0 lagi.")) { 
                localStorage.removeItem('kopiDesa_laporan_bahan'); 
                renderReportTable(); 
            } 
        }

        // Navigasi Ganti Halaman
        function switchView(view) {
            document.querySelectorAll('.nav-item').forEach(function(i) { i.classList.remove('active'); });
            if (view === 'kasir') {
                document.getElementById('navKasir').classList.add('active'); 
                document.getElementById('viewKasir').classList.remove('hidden'); 
                document.getElementById('viewLaporan').classList.add('hidden');
            } else {
                document.getElementById('navLaporan').classList.add('active'); 
                document.getElementById('viewKasir').classList.add('hidden'); 
                document.getElementById('viewLaporan').classList.remove('hidden'); 
                renderReportTable();
            }
        }

        // Menampilkan data pertama kali
        showMainCategory('Minuman', document.querySelector('#mainTabs .cat-btn'));
        renderCart();
    </script>
</body>
</html>
